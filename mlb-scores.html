<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLB Scores</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --sedona: #A71930;
    --sand: #E3C68B;
    --black: #0A0A0A;
    --charcoal: #1A1A1A;
    --mid: #2A2A2A;
    --dim: #3A3A3A;
    --muted: #666;
    --white: #F5F0E8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding-bottom: 40px;
  }

  .header {
    background: var(--sedona);
    padding: 14px 20px 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    color: var(--sand);
    line-height: 1;
  }

  .header-sub {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: rgba(255,255,255,0.7);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .refresh-btn {
    margin-left: auto;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    text-transform: uppercase;
  }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 20px 16px 8px;
  }

  .games-list {
    padding: 0 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .game-row {
    background: var(--charcoal);
    border-radius: 10px;
    border: 1px solid var(--dim);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 0;
    transition: border-color 0.2s;
  }

  .game-row.az-game {
    border-color: var(--sedona);
    background: rgba(167, 25, 48, 0.08);
  }

  .game-row.live {
    border-color: #444;
  }

  .teams-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .team-line {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .team-abbr {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 1.5px;
    line-height: 1;
    min-width: 42px;
    color: var(--white);
  }

  .team-abbr.az { color: var(--sand); }
  .team-abbr.loser { color: var(--muted); }

  .score-col {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
    min-width: 28px;
  }

  .score-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 1px;
    line-height: 1;
    color: var(--white);
  }

  .score-num.winner { color: var(--sand); }
  .score-num.loser { color: var(--muted); }

  .status-col {
    min-width: 56px;
    text-align: right;
    padding-left: 12px;
    flex-shrink: 0;
  }

  .status-text {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.5px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .status-text.live { color: #e87c7c; }
  .status-text.final { color: var(--muted); }
  .status-text.sched { color: var(--muted); }

  .live-pip {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #e87c7c;
    margin-right: 4px;
    animation: pulse 1.2s ease-in-out infinite;
    vertical-align: middle;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .divider-line {
    height: 1px;
    background: var(--dim);
    margin: 0 8px 4px;
    opacity: 0.5;
  }

  .state-msg {
    text-align: center;
    padding: 60px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--muted);
  }

  .last-updated {
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    padding: 20px 0 0;
    letter-spacing: 1px;
  }

  .no-games {
    margin: 20px 16px 0;
    background: var(--charcoal);
    border-radius: 12px;
    border: 1px solid var(--dim);
    padding: 40px 20px;
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-logo">MLB</div>
    <div class="header-sub">Scores Today</div>
  </div>
  <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
</div>

<div id="app"><div class="state-msg">Loading scores...</div></div>
<div class="last-updated" id="updated"></div>

<script>
const MLB_BASE = 'https://statsapi.mlb.com/api/v1';
const DBACKS_ID = 109;

function fmt(dt) {
  return new Date(dt).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
}

function ordinal(n) {
  const s = ['th','st','nd','rd'];
  const v = n % 100;
  return n + (s[(v-20)%10] || s[v] || s[0]);
}

async function loadData() {
  document.getElementById('updated').textContent = '';
  const app = document.getElementById('app');

  try {
    const now = new Date(); const today = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
    const res = await fetch(`${MLB_BASE}/schedule?sportId=1&date=${today}&hydrate=linescore`);
    const data = await res.json();

    const dates = data.dates || [];
    const games = dates.length > 0 ? dates[0].games : [];

    if (games.length === 0) {
      app.innerHTML = `<div class="no-games">No games scheduled today.</div>`;
      return;
    }

    // Log first game structure for debugging
    if (games.length > 0) console.log('GAME TEAM SAMPLE:', JSON.stringify(games[0].teams.away.team, null, 2));

    // Sort: live first, then scheduled, then final
    const order = { 'Live': 0, 'Preview': 1, 'Final': 2 };
    games.sort((a, b) => {
      const ao = order[a.status.abstractGameState] ?? 1;
      const bo = order[b.status.abstractGameState] ?? 1;
      if (ao !== bo) return ao - bo;
      return new Date(a.gameDate) - new Date(b.gameDate);
    });

    // Separate AZ from the rest
    const azGames = games.filter(g =>
      g.teams.home.team.id === DBACKS_ID || g.teams.away.team.id === DBACKS_ID
    );
    const otherGames = games.filter(g =>
      g.teams.home.team.id !== DBACKS_ID && g.teams.away.team.id !== DBACKS_ID
    );

    let html = '';

    if (azGames.length > 0) {
      html += `<div class="section-label">Diamondbacks</div><div class="games-list">`;
      azGames.forEach(g => { html += renderGameRow(g, true); });
      html += `</div>`;
    }

    if (otherGames.length > 0) {
      html += `<div class="section-label">Around the League</div><div class="games-list">`;
      otherGames.forEach(g => { html += renderGameRow(g, false); });
      html += `</div>`;
    }

    app.innerHTML = html;

    
    document.getElementById('updated').textContent =
      `Updated ${now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', second: '2-digit' })}`;

    // Auto refresh if any live games
    const hasLive = games.some(g => g.status.abstractGameState === 'Live');
    if (hasLive) setTimeout(loadData, 45000);

  } catch(e) {
    app.innerHTML = `<div class="state-msg">Couldn't load scores.<br>Check connection and refresh.</div>`;
    console.error(e);
  }
}

function renderGameRow(game, isAZ) {
  const away = game.teams.away;
  const home = game.teams.home;
  const ABBRS = {'Arizona Diamondbacks':'AZ','Atlanta Braves':'ATL','Baltimore Orioles':'BAL','Boston Red Sox':'BOS','Chicago Cubs':'CHC','Chicago White Sox':'CWS','Cincinnati Reds':'CIN','Cleveland Guardians':'CLE','Colorado Rockies':'COL','Detroit Tigers':'DET','Houston Astros':'HOU','Kansas City Royals':'KC','Los Angeles Angels':'LAA','Los Angeles Dodgers':'LAD','Miami Marlins':'MIA','Milwaukee Brewers':'MIL','Minnesota Twins':'MIN','New York Mets':'NYM','New York Yankees':'NYY','Athletics':'ATH','Oakland Athletics':'ATH','Philadelphia Phillies':'PHI','Pittsburgh Pirates':'PIT','San Diego Padres':'SD','San Francisco Giants':'SF','Seattle Mariners':'SEA','St. Louis Cardinals':'STL','Tampa Bay Rays':'TB','Texas Rangers':'TEX','Toronto Blue Jays':'TOR','Washington Nationals':'WSH'};
  const awayAbbr = ABBRS[away.team.name] || away.team.name?.split(' ').pop().substring(0,3).toUpperCase() || '???';
  const homeAbbr = ABBRS[home.team.name] || home.team.name?.split(' ').pop().substring(0,3).toUpperCase() || '???';
  const status = game.status.abstractGameState;
  const isLive = status === 'Live';
  const isFinal = status === 'Final';
  const isPreview = status === 'Preview';

  const awayScore = away.score ?? 0;
  const homeScore = home.score ?? 0;
  const awayWin = isFinal && awayScore > homeScore;
  const homeWin = isFinal && homeScore > awayScore;

  const awayIsAZ = away.team.id === DBACKS_ID;
  const homeIsAZ = home.team.id === DBACKS_ID;

  // Status label
  let statusHTML = '';
  if (isLive) {
    const line = game.linescore || {};
    const inn = line.currentInning || '—';
    const top = line.isTopInning;
    const half = top ? '▲' : '▼';
    statusHTML = `<div class="status-text live"><span class="live-pip"></span>${half}${inn}</div>`;
  } else if (isFinal) {
    statusHTML = `<div class="status-text final">Final</div>`;
  } else {
    statusHTML = `<div class="status-text sched">${fmt(game.gameDate)}</div>`;
  }

  const awayClass = `team-abbr${awayIsAZ ? ' az' : (isFinal && !awayWin ? ' loser' : '')}`;
  const homeClass = `team-abbr${homeIsAZ ? ' az' : (isFinal && !homeWin ? ' loser' : '')}`;
  const awayScoreClass = `score-num${awayWin ? ' winner' : (isFinal && !awayWin ? ' loser' : '')}`;
  const homeScoreClass = `score-num${homeWin ? ' winner' : (isFinal && !homeWin ? ' loser' : '')}`;

  const rowClass = `game-row${isAZ ? ' az-game' : ''}${isLive ? ' live' : ''}`;

  return `
    <div class="${rowClass}">
      <div class="teams-col">
        <div class="team-line">
          <span class="${awayClass}">${awayAbbr}</span>
        </div>
        <div class="divider-line"></div>
        <div class="team-line">
          <span class="${homeClass}">${homeAbbr}</span>
        </div>
      </div>
      ${!isPreview ? `
      <div class="score-col">
        <span class="${awayScoreClass}">${awayScore}</span>
        <span class="${homeScoreClass}">${homeScore}</span>
      </div>
      ` : ''}
      <div class="status-col">
        ${statusHTML}
      </div>
    </div>
  `;
}

loadData();
</script>
</body>
</html>
